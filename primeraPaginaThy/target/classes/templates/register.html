<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Nueva Cuenta</title>

    <style>
        /* Mantenemos tu estilo original para coherencia visual */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0f172a, #1e3a8a, #38bdf8);
            padding: 20px;
        }

        .contenedor {
            width: 100%;
            max-width: 420px;
        }

        .tarjeta {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(8px);
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.25);
            padding: 35px 30px;
            text-align: center;
            animation: aparecer 0.6s ease;
        }

        @keyframes aparecer {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .titulo {
            font-size: 30px;
            color: #0f172a;
            margin-bottom: 10px;
        }

        .subtitulo {
            font-size: 15px;
            color: #475569;
            margin-bottom: 25px;
        }

        .campo {
            margin-bottom: 18px;
            text-align: left;
        }

        .campo label {
            display: block;
            font-size: 13px;
            color: #64748b;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }

        .campo input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #dbeafe;
            border-radius: 14px;
            font-size: 15px;
            outline: none;
            background: #f8fafc;
            transition: all 0.3s ease;
        }

        .campo input:focus {
            border-color: #2563eb;
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
        }

        .boton {
            width: 100%;
            padding: 14px 20px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, #2563eb, #0ea5e9);
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(37, 99, 235, 0.25);
            margin-bottom: 20px;
        }

        .boton:hover {
            transform: translateY(-2px);
            box-shadow: 0 14px 24px rgba(37, 99, 235, 0.35);
        }

        .enlace-volver {
            display: inline-block;
            font-size: 14px;
            color: #2563eb;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }

        .enlace-volver:hover {
            color: #1e3a8a;
            text-decoration: underline;
        }

        /* Alerta opcional por si quieres mostrar errores */
        .error {
            background-color: #fee2e2;
            color: #991b1b;
            padding: 12px;
            border-radius: 12px;
            font-size: 14px;
            margin-bottom: 20px;
            border: 1px solid #fecaca;
        }

        @media (max-width: 480px) {
            .tarjeta {
                padding: 28px 22px;
            }
            .titulo { font-size: 25px; }
        }
    </style>
</head>
<body>

<div class="contenedor">
    <div class="tarjeta">
        <h2 class="titulo">Crear Cuenta</h2>
        <p class="subtitulo">Completa los datos para registrarse</p>

        <form th:action="@{/register}" method="post">

            <div class="campo">
                <label for="username">Nombre de Usuario</label>
                <input type="text" id="username" name="username"
                       placeholder="Elige un nombre de usuario" required autofocus>
            </div>

            <div class="campo">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password"
                       placeholder="Crea una contraseña segura" required>
            </div>

            <button type="submit" class="boton">Registrarse</button>

            <p style="font-size: 14px; color: #64748b;">

                <a th:href="@{/login}" class="enlace-volver">Iniciar sesión</a>
            </p>
        </form>
    </div>
</div>

</body>
</html>
